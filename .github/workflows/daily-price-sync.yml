name: Daily Israeli Grocery Price Sync

on:
  push:
    branches:
      - main
  schedule:
    # רץ כל לילה בשעה 2:00 בלילה שעון יוניברסלי (UTC) - בערך 4 בבוקר שעון ישראל
    - cron: '0 2 * * *'
  workflow_dispatch: # מאפשר להריץ באופן ידני מהממשק של גיטהאב

jobs:
  sync_prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Price Sync Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # --- Cerberus (url.publishedprices.co.il) ---
          # הרשמה חינמית לכל רשת בנפרד בפורטל שלהם
          RAMI_LEVY_USER: ${{ secrets.RAMI_LEVY_USER }}
          RAMI_LEVY_PASS: ${{ secrets.RAMI_LEVY_PASS }}
          VICTORY_USER: ${{ secrets.VICTORY_USER }}
          VICTORY_PASS: ${{ secrets.VICTORY_PASS }}
          KESHET_TAAMIM_USER: ${{ secrets.KESHET_TAAMIM_USER }}
          KESHET_TAAMIM_PASS: ${{ secrets.KESHET_TAAMIM_PASS }}
          YEINOT_BITAN_USER: ${{ secrets.YEINOT_BITAN_USER }}
          YEINOT_BITAN_PASS: ${{ secrets.YEINOT_BITAN_PASS }}
          STOP_MARKET_USER: ${{ secrets.STOP_MARKET_USER }}
          STOP_MARKET_PASS: ${{ secrets.STOP_MARKET_PASS }}
          # שאר הרשתות (טיב טעם, חצי חינם וכו') - ללא credentials, יעבדו אוטומטית
        run: node sync-prices.mjs
