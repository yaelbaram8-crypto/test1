name: Daily Israeli Grocery Price Sync

on:
  schedule:
    # 4:00 בבוקר שעון ישראל (2:00 UTC בחורף / 1:00 UTC בקיץ)
    - cron: '0 2 * * *'
  workflow_dispatch: # הרצה ידנית מ-GitHub UI

jobs:
  sync_prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Price Sync
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node --max-old-space-size=4096 --expose-gc sync-prices.mjs

      - name: Report summary
        if: always()
        run: |
          echo "## Price Sync Results" >> $GITHUB_STEP_SUMMARY
          echo "Ran at: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
