<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3737/3737372.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
    <title>חבי | סוכן החיסכון בסופר</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="styles.css">
    <!-- Global RTL Support (local copy) -->
    <link rel="stylesheet" href="rtl-styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="main-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-emoji">🤖</span>
                    <h1>חבי</h1>
                </div>
                <div class="header-actions">
                    <button id="view-toggle-btn" class="btn btn-secondary" title="שנה תצוגה">
                        <span class="icon">📌</span>
                    </button>
                    <button id="clear-list-btn" class="btn btn-danger" title="נקה רשימה">
                        <span class="icon">🗑️</span>
                    </button>
                    <button id="scan-receipt-btn" class="btn btn-secondary" title="סרוק קבלה">
                        <span class="icon">📸</span>
                    </button>
                    <button id="share-family-btn" class="btn btn-secondary" title="שתף רשימה עם המשפחה">
                        <span class="icon">👨‍👩‍👧</span>
                    </button>
                    <button id="auth-btn" class="btn btn-secondary" title="חשבון">
                        <span class="icon">👤</span>
                    </button>
                    <button id="optimize-cart-btn" class="btn btn-primary" title="השוואת מחירים (חסוך בסל)">
                        <span class="icon">💰</span>
                    </button>
                    <input type="file" id="receipt-upload" accept="image/*" capture="environment" style="display: none;">
                </div>
            </div>
        </header>

        <!-- Search/Add Section -->
        <section class="add-item-section">
            <div style="position:relative;">
                <div class="input-group">
                    <input type="text" id="item-input" placeholder="מה חסר לכם?" autocomplete="off">
                    <div class="qty-control">
                        <button id="qty-minus" class="qty-btn">−</button>
                        <input type="number" id="qty-input" value="1" min="1" max="99" aria-label="כמות" title="כמות">
                        <button id="qty-plus" class="qty-btn">+</button>
                    </div>
                    <button id="add-item-btn" class="btn btn-primary">הוספה</button>
                </div>
                <div id="catalog-dropdown" class="catalog-dropdown"></div>
            </div>
        </section>

        <!-- Main Content -->
        <main class="content-area">
            <!-- Price Alerts Banner (injected by JS when watching items) -->
            <div id="price-alerts-banner" style="display:none;"></div>

            <!-- Smart Suggestions (hidden by default, injected by JS) -->
            <div id="smart-suggestions-container"></div>

            <!-- Categories / List View -->
            <div id="shopping-list-container" class="view-section active">
                <div class="empty-state">
                    <p>הרשימה ריקה. זמן למלא את המקרר! ✨</p>
                </div>
            </div>

            <!-- Stats & Insights View -->
            <div id="stats-container" class="view-section" style="display: none;">
                <div class="empty-state">
                    <p>טוען נתונים חכמים...</p>
                </div>
            </div>
            
            <!-- History View -->
            <div id="history-container" class="view-section" style="display: none;">
                <div class="empty-state">
                    <p>היסטוריית הקניות שלך ריקה בינתיים.</p>
                </div>
            </div>

            <!-- Price Comparison View -->
            <div id="prices-container" class="view-section" style="display: none;"></div>
        </main>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="list">
                <span class="icon">📝</span>
                <span>רשימה</span>
            </button>
            <button class="nav-item" data-view="history">
                <span class="icon">🕒</span>
                <span>היסטוריה</span>
            </button>
            <button class="nav-item" data-view="stats">
                <span class="icon">📊</span>
                <span>סטטיסטיקה</span>
            </button>
            <button class="nav-item" data-view="prices">
                <span class="icon">🏷️</span>
                <span>מחירים</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- Local runtime config (ignored by git) -->
    <script src="app-config.js"></script>
    <!-- App Logic -->
    <script src="app.js" type="module"></script>
    <!-- Global RTL Helper (local copy) -->
    <script src="rtl-helper.js"></script>
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('📱 SW registered:', reg.scope))
            .catch(err => console.warn('⚠️ SW registration failed:', err));
        });
      }
    </script>
    <!-- Auth Modal -->
    <div id="auth-modal" class="auth-modal" style="display:none;">
        <div class="auth-modal-content">
            <h3>כניסה לחבי 🛒</h3>
            <p>התחברו כדי לשמור את הרשימה בענן ולשתף עם המשפחה</p>
            <button id="google-signin-btn" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                התחבר עם Google
            </button>
            <button id="auth-modal-close" class="btn btn-secondary" style="width:100%;margin-top:8px;">המשך ללא כניסה</button>
        </div>
    </div>
</body>
</html>
